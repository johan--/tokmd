blocking         = false
runner           = "ubuntu_latest"
base_lem         = 20
owner            = "release/ci"
intent           = "Run the tokmd Rust Small check/test lane on GitHub-hosted fallback when no trusted runner is selected."
failure_mode     = "Fallback routed CI regresses and swarm PRs lose a safe hosted path."
proof_obligation = "Run cargo check and cargo test for the workspace with all features."
evidence         = ["job logs"]
allowed_triggers = ["pull_request", "merge_group", "workflow_dispatch"]
duplicate_of     = ["build_test_linux"]
review_after     = "2026-06-21"
expires          = "2026-11-21"

[[lane]]
id               = "tokmd_rust_small_result"
workflow         = ".github/workflows/em-routed-rust-small.yml"
job              = "Tokmd Rust Small Result"
