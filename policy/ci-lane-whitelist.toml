proof_obligation = "Inspect trusted event shape and runner availability, then emit the selected target."
evidence         = ["job outputs", "router_target log line"]
allowed_triggers = ["pull_request", "merge_group", "workflow_dispatch"]
duplicate_of     = []
review_after     = "2026-06-21"
expires          = "2026-11-21"

