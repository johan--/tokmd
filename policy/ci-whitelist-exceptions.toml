schema_version = "1.0"
policy = "ci-whitelist-exceptions"
owner = "release/ci"
status = "active"

# Carve-outs that allow current CI to pass the lane whitelist check while
# a workflow/lane migration is in progress. Each exception MUST have an
# owner, a reason, a creation date, and an expiry. Expired exceptions are
# surfaced by `cargo xtask ci-lane-whitelist --strict`.

# No active exceptions. Expensive lanes now run on push, explicit labels,
# or risk-pack routing instead of ordinary PR defaults.
