schema = "tokmd.ast_shadow_corpus.v1"
status = "draft"
fact_family = "function_boundary"
language = "rust"
owner = "analysis_ast_shadow"

[rules]
path_style = "repo_relative"
supported_extension = ".rs"
public_behavior = "none"
proof_scope = "analysis_ast_shadow"

[[file]]
path = "fixtures/ast-shadow/rust/basic.rs"
reason = "baseline fixture with imports, one function, and simple control-flow landmarks"
category = "fixture_baseline"
expected_signal = "known_clean_parse"

[[file]]
path = "fixtures/ast-shadow/rust/parse-degraded.rs"
reason = "fixture that keeps parse degradation explicit in the candidate corpus"
category = "fixture_parse_degraded"
expected_signal = "parse_degraded"

[[file]]
path = "crates/tokmd-analysis/src/ast/rust.rs"
reason = "Rust AST parser implementation with parser-facing function shapes"
category = "shadow_implementation"
expected_signal = "ast_parser_corpus"

[[file]]
path = "crates/tokmd-analysis/src/ast/shadow.rs"
reason = "AST shadow artifact builder and comparison logic"
category = "shadow_implementation"
expected_signal = "artifact_builder_corpus"

[[file]]
path = "crates/tokmd-model/src/rows.rs"
reason = "ordinary model production code with helper functions, structs, and in-memory file-row logic"
category = "production_implementation"
expected_signal = "production_function_boundaries"

[[file]]
path = "crates/tokmd-analysis/src/complexity/functions/rust.rs"
reason = "Rust function extraction heuristic with nested and signature-heavy test cases"
category = "heuristic_implementation"
expected_signal = "function_boundary_mismatch"

[[file]]
path = "crates/tokmd-analysis/src/imports/parser.rs"
reason = "parser code with embedded fixture strings and docs-adjacent Rust examples"
category = "fixture_string_risk"
expected_signal = "heuristic_false_positive_risk"

[[file]]
path = "crates/tokmd-cockpit/src/review_plan.rs"
reason = "review surface logic where function-boundary precision may later inform review ordering"
category = "product_adjacent_surface"
expected_signal = "product_adjacent_corpus"

[[file]]
path = "crates/tokmd/src/context_pack/select.rs"
reason = "agent context selection logic where function-boundary precision may later inform handoff packets"
category = "product_adjacent_surface"
expected_signal = "product_adjacent_corpus"

[[file]]
path = "xtask/src/tasks/ast_shadow_compare.rs"
reason = "developer runner implementation with command parsing and reproduction-command rendering"
category = "tooling_implementation"
expected_signal = "tooling_corpus"

[[file]]
path = "xtask/src/tasks/ast_shadow_check.rs"
reason = "developer verifier implementation that validates AST shadow artifacts and summary counts"
category = "tooling_implementation"
expected_signal = "tooling_corpus"

[[file]]
path = "xtask/src/cli.rs"
reason = "derive and command-attribute-heavy developer CLI declarations"
category = "macro_heavy"
expected_signal = "attribute_macro_corpus"

[[file]]
path = "crates/tokmd/tests/handoff_integration.rs"
reason = "integration-test corpus with helper functions and embedded Rust snippets"
category = "test_corpus"
expected_signal = "test_helper_and_fixture_string_mix"

[[file]]
path = "crates/tokmd/tests/data/large.rs"
reason = "mechanically repetitive checked-in Rust fixture used by CLI tests"
category = "generated_like"
expected_signal = "mechanical_fixture_corpus"
