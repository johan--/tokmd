name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

jobs:
  build-release:
    name: Build Release
    if: github.repository == 'EffortlessMetrics/tokmd'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: tokmd-linux-amd64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: tokmd-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            name: tokmd-macos-amd64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            name: tokmd-macos-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: tokmd-windows-amd64.exe
            cross: false

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin tokmd

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --bin tokmd

      - name: Rename Binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/tokmd.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/tokmd ${{ matrix.name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-wasm:
    name: Build tokmd-wasm Artifact
    if: github.repository == 'EffortlessMetrics/tokmd'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v6
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build tokmd-wasm bundle
        run: npm --prefix web/runner run build:wasm
      - name: Package reproducible tokmd-wasm artifact
        run: |
          mkdir -p artifacts
          tar --sort=name \
            --owner=0 --group=0 --numeric-owner \
            --mtime='UTC 1970-01-01' \
            -czf "artifacts/tokmd-wasm-${GITHUB_REF_NAME}.tar.gz" \
            -C web/runner/vendor/tokmd-wasm .
          sha256sum "artifacts/tokmd-wasm-${GITHUB_REF_NAME}.tar.gz" > "artifacts/tokmd-wasm-${GITHUB_REF_NAME}.sha256"
      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: tokmd-wasm-${{ github.ref_name }}
          path: |
            artifacts/tokmd-wasm-${{ github.ref_name }}.tar.gz
            artifacts/tokmd-wasm-${{ github.ref_name }}.sha256

  create-release:
    name: Create GitHub Release
    needs:
      - build-release
      - build-wasm
    if: github.repository == 'EffortlessMetrics/tokmd'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/tokmd-linux-amd64/tokmd-linux-amd64
            artifacts/tokmd-linux-arm64/tokmd-linux-arm64
            artifacts/tokmd-macos-amd64/tokmd-macos-amd64
            artifacts/tokmd-macos-arm64/tokmd-macos-arm64
            artifacts/tokmd-windows-amd64.exe/tokmd-windows-amd64.exe
            artifacts/tokmd-wasm-${{ github.ref_name }}/tokmd-wasm-${{ github.ref_name }}.tar.gz
            artifacts/tokmd-wasm-${{ github.ref_name }}/tokmd-wasm-${{ github.ref_name }}.sha256

      - name: Generate shell completions
        run: |
          mkdir -p completions
          chmod +x artifacts/tokmd-linux-amd64/tokmd-linux-amd64
          TOKMD=artifacts/tokmd-linux-amd64/tokmd-linux-amd64
          $TOKMD completions bash > completions/tokmd.bash
          $TOKMD completions zsh > completions/_tokmd
          $TOKMD completions fish > completions/tokmd.fish
          $TOKMD completions powershell > completions/_tokmd.ps1
          $TOKMD completions elvish > completions/tokmd.elv
          ls -la completions/
          mkdir -p artifacts/completions
          tar -czvf artifacts/completions/completions.tar.gz -C completions .

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.txt
          mv ../checksums.txt .
          cat checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}

      - name: Update major version tag
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          # Extract major version from tag (v1.2.3 -> v1)
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Update $MAJOR to $TAG"
          git push origin "$MAJOR" --force

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    # Prerelease tags are distributed as GitHub Release assets only.
    if: ${{ github.repository == 'EffortlessMetrics/tokmd' && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        run: cargo xtask publish --yes --skip-tests --verbose

  docker:
    name: Build and Push Docker Image
    needs: create-release
    # Stable-only: avoid moving Docker semver aliases for prerelease tags.
    if: ${{ github.repository == 'EffortlessMetrics/tokmd' && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/effortlessmetrics/tokmd
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
