name: Tokmd Routed Rust Small

on:
  workflow_dispatch:
    inputs:
      force_target:
        description: "Optional proof override for the route target"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - cpx42
          - cx43
          - cx53
          - github
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: tokmd-rust-small-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  route-rust-small:
    name: Route Tokmd Rust Small
    if: github.repository == 'EffortlessMetrics/tokmd-swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target: ${{ steps.route.outputs.target }}
      reason: ${{ steps.route.outputs.reason }}
      error: ${{ steps.route.outputs.error }}
      trusted_self_hosted: ${{ steps.route.outputs.trusted_self_hosted }}
    steps:
      - name: Decide target runner
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
          FORCE_TARGET: ${{ github.event.inputs.force_target || 'auto' }}
          TRUSTED_SELF_HOSTED: >-
            ${{
              github.event_name == 'workflow_dispatch' ||
              github.event_name == 'merge_group' ||
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            }}
        run: |
          set -eu

          emit() {
            local target="$1" reason="$2" error="$3" trusted="$4"
            echo "router_target=${target}"
            echo "router_reason=${reason}"
            echo "router_error=${error}"
            echo "trusted_self_hosted=${trusted}"
            {
              echo "target=${target}"
              echo "reason=${reason}"
              echo "error=${error}"
              echo "trusted_self_hosted=${trusted}"
            } >> "$GITHUB_OUTPUT"
          }

          trusted="${TRUSTED_SELF_HOSTED:-false}"

          case "${FORCE_TARGET:-auto}" in
            auto|"")
              ;;
            github)
              emit "github" "forced_github" "false" "${trusted}"
              exit 0
              ;;
            cpx42|cx43|cx53)
              if [ "${trusted}" != "true" ]; then
                emit "github" "fork_pr" "true" "${trusted}"
                exit 0
              fi
              emit "${FORCE_TARGET}" "forced_${FORCE_TARGET}" "false" "${trusted}"
              exit 0
              ;;
            *)
              emit "github" "invalid_force_target" "true" "${trusted}"
              exit 0
              ;;
          esac

          if [ "${trusted}" != "true" ]; then
            emit "github" "fork_pr" "false" "${trusted}"
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            emit "github" "runner_token_missing" "true" "${trusted}"
            exit 0
          fi

          if ! runners_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "orgs/${ORG}/actions/runners?per_page=100" 2>/tmp/gh.err)"; then
            echo "runner API request failed:" >&2
            cat /tmp/gh.err >&2 || true
            err="$(cat /tmp/gh.err 2>/dev/null || true)"
            if echo "$err" | grep -qi "401"; then
              emit "github" "runner_token_unauthorized" "true" "${trusted}"
            elif echo "$err" | grep -qi "403"; then
              emit "github" "runner_token_forbidden" "true" "${trusted}"
            else
              emit "github" "runner_api_failed" "true" "${trusted}"
            fi
            exit 0
          fi

          if ! RUNNERS_JSON="${runners_json}" python - <<'PY' > runner-counts.env
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])

          def idle_count(required_labels):
              count = 0
              for runner in data.get("runners", []):
                  labels = {label.get("name") for label in runner.get("labels", [])}
                  required = set(required_labels)
                  if (
                      runner.get("status") == "online"
                      and not runner.get("busy", True)
                      and required.issubset(labels)
                  ):
                      count += 1
              return count

          print(f'idle_cpx42={idle_count(["em-ci", "cpx42", "rust-medium", "rust-16gb", "trusted-pr"])}')
          print(f'idle_cx43={idle_count(["em-ci", "cx43", "rust-small", "trusted-pr"])}')
          print(f'idle_cx53={idle_count(["em-ci", "cx53", "rust-small", "trusted-pr"])}')
          PY
          then
            emit "github" "parse_failed" "true" "${trusted}"
            exit 0
          fi

          . ./runner-counts.env

          echo "idle_cpx42=${idle_cpx42:-0}"
          echo "idle_cx43=${idle_cx43:-0}"
          echo "idle_cx53=${idle_cx53:-0}"

          if [ "${idle_cpx42:-0}" -gt 0 ]; then
            emit "cpx42" "cpx42_idle" "false" "${trusted}"
          elif [ "${idle_cx43:-0}" -gt 0 ]; then
            emit "cx43" "cx43_idle" "false" "${trusted}"
          elif [ "${idle_cx53:-0}" -gt 0 ]; then
            emit "cx53" "cx53_idle" "false" "${trusted}"
          else
            emit "github" "no_idle_runner" "false" "${trusted}"
          fi

  rust-small-cpx42:
    name: Tokmd Rust Small on CPX42
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cpx42' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "7"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Prepare CPX42 scratch
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Preflight CPX42 toolchain
        shell: bash
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          if command -v python3 >/dev/null 2>&1; then python3 --version; elif command -v python >/dev/null 2>&1; then python --version; fi

      - name: Check workspace on CPX42
        run: cargo check --workspace --all-features --locked

      - name: Test workspace on CPX42
        run: cargo test --workspace --all-features --locked

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf "$TMPDIR"
          rm -rf "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  rust-small-cx43:
    name: Tokmd Rust Small on CX43
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cx43' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-small, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 30G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "4"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 95
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Cleanup stale workspace scratch
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          mkdir -p "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Expose Git metadata to container
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "HOST_GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)"
            echo "HOST_GIT_COMMON_DIR=$(git rev-parse --path-format=absolute --git-common-dir)"
          } >> "$GITHUB_ENV"

      - name: Check and test tokmd rust-small on CX43
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="6" \
            --memory="12g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${HOST_GIT_DIR}:${HOST_GIT_DIR}:ro" \
            -v "${HOST_GIT_COMMON_DIR}:${HOST_GIT_COMMON_DIR}:ro" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              git rev-parse --verify HEAD
              rustc --version
              cargo --version
              sccache --version
              cargo fetch --locked
              cargo check --workspace --all-features --locked
              cargo test --workspace --all-features --locked
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /target/* /target/.[!.]* /target/..?* 2>/dev/null || true
              rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  rust-small-cx53:
    name: Tokmd Rust Small on CX53
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cx53' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-small, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 60G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "12"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 100
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Cleanup stale workspace scratch
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          mkdir -p "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Expose Git metadata to container
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "HOST_GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)"
            echo "HOST_GIT_COMMON_DIR=$(git rev-parse --path-format=absolute --git-common-dir)"
          } >> "$GITHUB_ENV"

      - name: Check and test tokmd rust-small on CX53
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="14" \
            --memory="28g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${HOST_GIT_DIR}:${HOST_GIT_DIR}:ro" \
            -v "${HOST_GIT_COMMON_DIR}:${HOST_GIT_COMMON_DIR}:ro" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              git rev-parse --verify HEAD
              rustc --version
              cargo --version
              sccache --version
              cargo fetch --locked
              cargo check --workspace --all-features --locked
              cargo test --workspace --all-features --locked
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /target/* /target/.[!.]* /target/..?* 2>/dev/null || true
              rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  rust-small-github:
    name: Tokmd Rust Small on GitHub Hosted
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'github'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Use larger writable target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ${{ runner.temp }}/target
          save-if: false

      - name: Check workspace
        run: cargo check --workspace --all-features --locked

      - name: Test workspace
        run: cargo test --workspace --all-features --locked

  rust-small-result:
    name: Tokmd Rust Small Result
    needs:
      - route-rust-small
      - rust-small-cpx42
      - rust-small-cx43
      - rust-small-cx53
      - rust-small-github
    if: >-
      always() &&
      github.repository == 'EffortlessMetrics/tokmd-swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate router and selected target
        shell: bash
        env:
          TARGET: ${{ needs.route-rust-small.outputs.target }}
          ROUTER_RESULT: ${{ needs.route-rust-small.result }}
          CPX42_RESULT: ${{ needs.rust-small-cpx42.result }}
          CX43_RESULT: ${{ needs.rust-small-cx43.result }}
          CX53_RESULT: ${{ needs.rust-small-cx53.result }}
          GITHUB_RESULT: ${{ needs.rust-small-github.result }}
        run: |
          set -eu
          echo "router_target=${TARGET:-<empty>}"
          echo "router_result=${ROUTER_RESULT:-<empty>}"
          echo "cpx42_result=${CPX42_RESULT:-<empty>}"
          echo "cx43_result=${CX43_RESULT:-<empty>}"
          echo "cx53_result=${CX53_RESULT:-<empty>}"
          echo "github_result=${GITHUB_RESULT:-<empty>}"

          if [ "${ROUTER_RESULT}" != "success" ]; then
            echo "router job did not succeed; failing normalized result" >&2
            exit 1
          fi

          case "${TARGET}" in
            cpx42)
              if [ "${CPX42_RESULT}" != "success" ]; then
                echo "selected target cpx42 but rust-small-cpx42 result was ${CPX42_RESULT}" >&2
                exit 1
              fi
              ;;
            cx43)
              if [ "${CX43_RESULT}" != "success" ]; then
                echo "selected target cx43 but rust-small-cx43 result was ${CX43_RESULT}" >&2
                exit 1
              fi
              ;;
            cx53)
              if [ "${CX53_RESULT}" != "success" ]; then
                echo "selected target cx53 but rust-small-cx53 result was ${CX53_RESULT}" >&2
                exit 1
              fi
              ;;
            github)
              if [ "${GITHUB_RESULT}" != "success" ]; then
                echo "selected target github but rust-small-github result was ${GITHUB_RESULT}" >&2
                exit 1
              fi
              ;;
            *)
              echo "router produced unknown target: ${TARGET}" >&2
              exit 1
              ;;
          esac

          echo "Tokmd Rust Small Result: success"
