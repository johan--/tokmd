name: Tokmd Routed Rust Small

on:
  workflow_dispatch:
    inputs:
      force_target:
        description: "Optional proof override for the route target"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - cpx42
          - cx43
          - cx53
          - github
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: tokmd-rust-small-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  route-rust-small:
    name: Route Tokmd Rust Small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target: ${{ steps.route.outputs.target }}
      reason: ${{ steps.route.outputs.reason }}
      error: ${{ steps.route.outputs.error }}
      trusted_self_hosted: ${{ steps.route.outputs.trusted_self_hosted }}
      fallback_allowed: ${{ steps.route.outputs.fallback_allowed }}
    steps:
      - name: Decide target runner
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
          FORCE_TARGET: ${{ github.event.inputs.force_target || 'auto' }}
          LABELS_JSON: ${{ github.event_name == 'pull_request' && toJson(github.event.pull_request.labels) || '[]' }}
          TRUSTED_SELF_HOSTED: >-
            ${{
              github.event_name == 'workflow_dispatch' ||
              github.event_name == 'merge_group' ||
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            }}
        run: |
          set -eu

          emit() {
            local target="$1" reason="$2" error="$3" trusted="$4" fallback="$5"
            echo "router_target=${target}"
            echo "router_reason=${reason}"
            echo "router_error=${error}"
            echo "trusted_self_hosted=${trusted}"
            echo "fallback_allowed=${fallback}"
            {
              echo "target=${target}"
              echo "reason=${reason}"
              echo "error=${error}"
              echo "trusted_self_hosted=${trusted}"
              echo "fallback_allowed=${fallback}"
            } >> "$GITHUB_OUTPUT"
          }

          trusted="${TRUSTED_SELF_HOSTED:-false}"
          fallback_allowed="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "merge_group" ]; then
            fallback_allowed="true"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${trusted}" = "true" ]; then
            fallback_allowed="true"
          elif [ "${{ github.event_name }}" = "pull_request" ] && python - <<'PY'
          import json
          import os
          raw_labels = json.loads(os.environ.get("LABELS_JSON", "[]"))
          labels = {
              label.get("name") if isinstance(label, dict) else str(label)
              for label in raw_labels
          }
          allowed = bool({"allow-github-hosted", "ci-budget-ack"} & labels)
          raise SystemExit(0 if allowed else 1)
          PY
          then
            fallback_allowed="true"
          fi

          case "${FORCE_TARGET:-auto}" in
            auto|"")
              ;;
            github)
              emit "github" "forced_github" "false" "${trusted}" "true"
              exit 0
              ;;
            cpx42|cx43|cx53)
              if [ "${trusted}" != "true" ]; then
                emit "github" "fork_pr" "true" "${trusted}" "true"
                exit 0
              fi
              emit "${FORCE_TARGET}" "forced_${FORCE_TARGET}" "false" "${trusted}" "${fallback_allowed}"
              exit 0
              ;;
            *)
              emit "none" "invalid_force_target" "true" "${trusted}" "${fallback_allowed}"
              exit 0
              ;;
          esac

          if [ "${trusted}" != "true" ]; then
            emit "github" "fork_pr" "false" "${trusted}" "true"
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            if [ "${trusted}" = "true" ]; then
              emit "github" "runner_token_missing_github_fallback" "true" "${trusted}" "true"
            else
              emit "none" "runner_token_missing" "true" "${trusted}" "${fallback_allowed}"
            fi
            exit 0
          fi

          if ! runners_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "orgs/${ORG}/actions/runners?per_page=100" 2>/tmp/gh.err)"; then
            echo "runner API request failed:" >&2
            cat /tmp/gh.err >&2 || true
            err="$(cat /tmp/gh.err 2>/dev/null || true)"
            if [ "${trusted}" = "true" ]; then
              emit "github" "runner_api_failed_github_fallback" "true" "${trusted}" "true"
            elif echo "$err" | grep -qi "401"; then
              emit "none" "runner_token_unauthorized" "true" "${trusted}" "${fallback_allowed}"
            elif echo "$err" | grep -qi "403"; then
              emit "none" "runner_token_forbidden" "true" "${trusted}" "${fallback_allowed}"
            else
              emit "none" "runner_api_failed" "true" "${trusted}" "${fallback_allowed}"
            fi
            exit 0
          fi

          if ! RUNNERS_JSON="${runners_json}" python - <<'PY' > runner-counts.env
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])

          def idle_count(required_labels):
              count = 0
              for runner in data.get("runners", []):
                  labels = {label.get("name") for label in runner.get("labels", [])}
                  required = set(required_labels)
                  if (
                      runner.get("status") == "online"
                      and not runner.get("busy", True)
                      and required.issubset(labels)
                  ):
                      count += 1
              return count

          print(f'idle_cx43={idle_count(["em-ci", "cx43", "rust-medium", "trusted-pr"])}')
          print(f'idle_cpx42={idle_count(["em-ci", "cpx42", "rust-medium", "rust-16gb", "trusted-pr"])}')
          print(f'idle_cx53={idle_count(["em-ci", "cx53", "rust-large", "trusted-pr"])}')
          PY
          then
            if [ "${trusted}" = "true" ]; then
              emit "github" "runner_parse_failed_github_fallback" "true" "${trusted}" "true"
            else
              emit "none" "parse_failed" "true" "${trusted}" "${fallback_allowed}"
            fi
            exit 0
          fi

          . ./runner-counts.env

          echo "idle_cx43=${idle_cx43:-0}"
          echo "idle_cpx42=${idle_cpx42:-0}"
          echo "idle_cx53=${idle_cx53:-0}"

          if [ "${idle_cpx42:-0}" -gt 0 ]; then
            emit "cpx42" "cpx42_idle" "false" "${trusted}" "${fallback_allowed}"
          elif [ "${idle_cx53:-0}" -gt 0 ]; then
            emit "cx53" "cx53_idle" "false" "${trusted}" "${fallback_allowed}"
          elif [ "${idle_cx43:-0}" -gt 0 ]; then
            emit "cx43" "cx43_idle" "false" "${trusted}" "${fallback_allowed}"
          else
            if [ "${fallback_allowed}" = "true" ]; then
              emit "github" "no_idle_runner" "false" "${trusted}" "true"
            else
              emit "none" "no_idle_runner" "true" "${trusted}" "false"
            fi
          fi

  rust-small-cpx42:
    name: Tokmd Rust Small on CPX42
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cpx42' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "7"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Prepare CPX42 scratch
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Preflight CPX42 toolchain
        shell: bash
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          if command -v python3 >/dev/null 2>&1; then python3 --version; elif command -v python >/dev/null 2>&1; then python --version; fi

      - name: Check workspace on CPX42
        run: cargo check --workspace --all-features --locked

      - name: Test workspace on CPX42
        run: cargo test --workspace --all-features --locked

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf "$TMPDIR"
          rm -rf "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  rust-small-cx43:
    name: Tokmd Rust Small on CX43
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cx43' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-medium, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 30G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "4"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 80
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Cleanup stale workspace scratch
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          mkdir -p "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Expose Git metadata to container
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "HOST_GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)"
            echo "HOST_GIT_COMMON_DIR=$(git rev-parse --path-format=absolute --git-common-dir)"
          } >> "$GITHUB_ENV"

      - name: Check and test tokmd rust-small on CX43
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="6" \
            --memory="12g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${HOST_GIT_DIR}:${HOST_GIT_DIR}:ro" \
            -v "${HOST_GIT_COMMON_DIR}:${HOST_GIT_COMMON_DIR}:ro" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              git rev-parse --verify HEAD
              rustc --version
              cargo --version
              sccache --version
              cargo fetch --locked
              cargo check --workspace --all-features --locked
              cargo test --workspace --all-features --locked
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /target/* /target/.[!.]* /target/..?* 2>/dev/null || true
              rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  rust-small-cx53:
    name: Tokmd Rust Small on CX53
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'cx53' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-large, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 60G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "12"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 100
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Cleanup stale workspace scratch
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          mkdir -p "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Expose Git metadata to container
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "HOST_GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)"
            echo "HOST_GIT_COMMON_DIR=$(git rev-parse --path-format=absolute --git-common-dir)"
          } >> "$GITHUB_ENV"

      - name: Check and test tokmd rust-small on CX53
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="14" \
            --memory="28g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${HOST_GIT_DIR}:${HOST_GIT_DIR}:ro" \
            -v "${HOST_GIT_COMMON_DIR}:${HOST_GIT_COMMON_DIR}:ro" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              git rev-parse --verify HEAD
              rustc --version
              cargo --version
              sccache --version
              cargo fetch --locked
              cargo check --workspace --all-features --locked
              cargo test --workspace --all-features --locked
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /target/* /target/.[!.]* /target/..?* 2>/dev/null || true
              rm -rf /workspace/target /workspace/xtask/target 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  rust-small-github:
    name: Tokmd Rust Small on GitHub Hosted
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'github' &&
      needs.route-rust-small.outputs.fallback_allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Use larger writable target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ${{ runner.temp }}/target
          save-if: false

      - name: Check and test tokmd rust-small on GitHub Hosted
        run: |
          cargo check --workspace --all-features --locked
          cargo test --workspace --all-features --locked

  rust-small-result:
    name: Tokmd Rust Small Result
    needs:
      - route-rust-small
      - rust-small-cpx42
      - rust-small-cx43
      - rust-small-cx53
      - rust-small-github
    if: >-
      always() &&
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate router and selected target
        shell: bash
        env:
          TARGET: ${{ needs.route-rust-small.outputs.target }}
          REASON: ${{ needs.route-rust-small.outputs.reason }}
          ROUTER_ERROR: ${{ needs.route-rust-small.outputs.error }}
          TRUSTED_SELF_HOSTED: ${{ needs.route-rust-small.outputs.trusted_self_hosted }}
          FALLBACK_ALLOWED: ${{ needs.route-rust-small.outputs.fallback_allowed }}
          ROUTER_RESULT: ${{ needs.route-rust-small.result }}
          CPX42_RESULT: ${{ needs.rust-small-cpx42.result }}
          CX43_RESULT: ${{ needs.rust-small-cx43.result }}
          CX53_RESULT: ${{ needs.rust-small-cx53.result }}
          GITHUB_RESULT: ${{ needs.rust-small-github.result }}
        run: |
          set -eu
          mkdir -p target/ci

          echo "router_target=${TARGET:-<empty>}"
          echo "router_reason=${REASON:-<empty>}"
          echo "router_error=${ROUTER_ERROR:-<empty>}"
          echo "trusted_self_hosted=${TRUSTED_SELF_HOSTED:-<empty>}"
          echo "fallback_allowed=${FALLBACK_ALLOWED:-<empty>}"
          echo "router_result=${ROUTER_RESULT:-<empty>}"
          echo "cpx42_result=${CPX42_RESULT:-<empty>}"
          echo "cx43_result=${CX43_RESULT:-<empty>}"
          echo "cx53_result=${CX53_RESULT:-<empty>}"
          echo "github_result=${GITHUB_RESULT:-<empty>}"

          ok="false"
          status="failure"
          selected_result=""
          selected_job=""
          message=""

          if [ "${ROUTER_RESULT}" != "success" ]; then
            message="router job did not succeed; failing normalized result"
          else
            case "${TARGET}" in
              cpx42)
                selected_job="rust-small-cpx42"
                selected_result="${CPX42_RESULT}"
                ;;
              cx43)
                selected_job="rust-small-cx43"
                selected_result="${CX43_RESULT}"
                ;;
              cx53)
                selected_job="rust-small-cx53"
                selected_result="${CX53_RESULT}"
                ;;
              github)
                selected_job="rust-small-github"
                selected_result="${GITHUB_RESULT}"
                ;;
              none)
                selected_job="none"
                selected_result="none"
                message="No execution lane selected (reason=${REASON}). Use label allow-github-hosted or ci-budget-ack, or rerun via workflow_dispatch with force_target=github."
                ;;
              *)
                selected_job="unknown"
                selected_result="unknown"
                message="router produced unknown target: ${TARGET}"
                ;;
            esac

            if [ "${selected_result}" = "success" ]; then
              ok="true"
              status="success"
              message="selected target ${TARGET} succeeded"
            elif [ "${selected_job}" != "none" ] && [ "${selected_job}" != "unknown" ]; then
              message="selected target ${TARGET} but ${selected_job} result was ${selected_result}"
            fi
          fi

          export ROUTER_TARGET="${TARGET:-}"
          export ROUTER_REASON="${REASON:-}"
          export ROUTER_ERROR="${ROUTER_ERROR:-}"
          export ROUTER_TRUSTED_SELF_HOSTED="${TRUSTED_SELF_HOSTED:-}"
          export ROUTER_FALLBACK_ALLOWED="${FALLBACK_ALLOWED:-}"
          export ROUTER_RESULT="${ROUTER_RESULT:-}"
          export SELECTED_JOB="${selected_job}"
          export SELECTED_RESULT="${selected_result}"
          export RESULT_OK="${ok}"
          export RESULT_STATUS="${status}"
          export RESULT_MESSAGE="${message}"
          export CPX42_RESULT="${CPX42_RESULT:-}"
          export CX43_RESULT="${CX43_RESULT:-}"
          export CX53_RESULT="${CX53_RESULT:-}"
          export GITHUB_RESULT="${GITHUB_RESULT:-}"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def env(name, default=""):
              return os.environ.get(name, default)

          receipt = {
              "schema": "tokmd.routed_rust_small_result.v1",
              "schema_version": 1,
              "ok": env("RESULT_OK") == "true",
              "status": env("RESULT_STATUS", "failure"),
              "message": env("RESULT_MESSAGE"),
              "router": {
                  "target": env("ROUTER_TARGET"),
                  "reason": env("ROUTER_REASON"),
                  "error": env("ROUTER_ERROR"),
                  "trusted_self_hosted": env("ROUTER_TRUSTED_SELF_HOSTED"),
                  "fallback_allowed": env("ROUTER_FALLBACK_ALLOWED"),
                  "result": env("ROUTER_RESULT"),
              },
              "selected": {
                  "job": env("SELECTED_JOB"),
                  "result": env("SELECTED_RESULT"),
              },
              "jobs": {
                  "cpx42": env("CPX42_RESULT"),
                  "cx43": env("CX43_RESULT"),
                  "cx53": env("CX53_RESULT"),
                  "github": env("GITHUB_RESULT"),
              },
              "run": {
                  "event": env("GITHUB_EVENT_NAME"),
                  "run_id": env("GITHUB_RUN_ID"),
                  "run_attempt": env("GITHUB_RUN_ATTEMPT"),
                  "sha": env("GITHUB_SHA"),
                  "ref": env("GITHUB_REF"),
              },
          }

          path = Path("target/ci/routed-rust-small-result.json")
          path.write_text(json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Tokmd Rust Small Result"
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| status | \`${status}\` |"
              echo "| target | \`${TARGET:-<empty>}\` |"
              echo "| reason | \`${REASON:-<empty>}\` |"
              echo "| router error | \`${ROUTER_ERROR:-<empty>}\` |"
              echo "| trusted self-hosted | \`${TRUSTED_SELF_HOSTED:-<empty>}\` |"
              echo "| selected job | \`${selected_job:-<empty>}\` |"
              echo "| selected result | \`${selected_result:-<empty>}\` |"
              echo "| fallback allowed | \`${FALLBACK_ALLOWED:-<empty>}\` |"
              echo
              echo 'Receipt: `target/ci/routed-rust-small-result.json`'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${ok}" != "true" ]; then
            echo "${message}" >&2
            exit 1
          fi
          echo "Tokmd Rust Small Result: success"

      - name: Verify routed Rust Small result receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s target/ci/routed-rust-small-result.json
          python -m json.tool target/ci/routed-rust-small-result.json >/dev/null

      - name: Upload routed Rust Small result receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: routed-rust-small-result
          path: target/ci/routed-rust-small-result.json
          if-no-files-found: error
