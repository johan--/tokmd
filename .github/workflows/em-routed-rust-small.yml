name: Tokmd Routed Rust Small

on:
  workflow_dispatch:
    inputs:
      force_target:
        description: "Optional proof override for the route target"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - force-github-hosted
          - force-self-hosted
          - self-hosted
          - github-hosted
          - simulate-full
          - simulate-unhealthy
          - simulate-api-unavailable
          - simulate-untrusted
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

jobs:
  route-rust-small:
    name: Route Tokmd Rust Small
    if: github.repository == 'EffortlessMetrics/tokmd-swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      target: ${{ steps.route.outputs.target }}
      reason: ${{ steps.route.outputs.reason }}
      selected_runner_label: ${{ steps.route.outputs.selected_runner_label }}
      receipt_path: ${{ steps.route.outputs.receipt_path }}
    steps:
      - name: Checkout route helper from protected base
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}

      - name: Install Rust 1.95.0 for route helper
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"

      - name: Read self-hosted runner state
        id: runner_state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
        run: |
          set -euo pipefail

          emit_unavailable() {
            local token_available="$1" api_available="$2"
            {
              echo "runner_token_available=${token_available}"
              echo "runner_api_available=${api_available}"
              echo "eligible_runners=0"
              echo "busy_runners=0"
              echo "healthy_runners=0"
              echo "health=unknown"
              echo "selected_runner="
            } >> "$GITHUB_OUTPUT"
          }

          if [ -z "${GH_TOKEN:-}" ]; then
            emit_unavailable false false
            exit 0
          fi

          if ! runners_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "orgs/${ORG}/actions/runners?per_page=100" 2>/tmp/runner-api.err)"; then
            echo "runner API request failed:" >&2
            cat /tmp/runner-api.err >&2 || true
            emit_unavailable true false
            exit 0
          fi

          RUNNERS_JSON="${runners_json}" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])
          required = {"self-hosted", "linux", "x64", "em-ci", "trusted-pr"}
          eligible = []
          idle = []
          busy = 0

          for runner in data.get("runners", []):
              labels = {label.get("name") for label in runner.get("labels", [])}
              if runner.get("status") != "online" or not required.issubset(labels):
                  continue
              eligible.append(runner)
              if runner.get("busy", True):
                  busy += 1
              else:
                  idle.append(runner)

          selected = idle[0].get("name", "") if idle else ""
          print("runner_token_available=true")
          print("runner_api_available=true")
          print(f"eligible_runners={len(eligible)}")
          print(f"busy_runners={busy}")
          print(f"healthy_runners={len(eligible)}")
          print("health=healthy")
          print(f"selected_runner={selected}")
          PY

      - name: Decide target runner
        id: route
        shell: bash
        env:
          FORCE_TARGET: ${{ github.event.inputs.force_target || 'auto' }}
          TRUSTED_SELF_HOSTED: >-
            ${{
              github.event_name == 'workflow_dispatch' ||
              github.event_name == 'merge_group' ||
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            }}
          FORK_PR: >-
            ${{
              github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name != github.repository
            }}
          RUNNER_TOKEN_AVAILABLE: ${{ steps.runner_state.outputs.runner_token_available || 'false' }}
          RUNNER_API_AVAILABLE: ${{ steps.runner_state.outputs.runner_api_available || 'false' }}
          ELIGIBLE_RUNNERS: ${{ steps.runner_state.outputs.eligible_runners || '0' }}
          BUSY_RUNNERS: ${{ steps.runner_state.outputs.busy_runners || '0' }}
          HEALTHY_RUNNERS: ${{ steps.runner_state.outputs.healthy_runners || '0' }}
          ROUTE_HEALTH: ${{ steps.runner_state.outputs.health || 'unknown' }}
          SELECTED_RUNNER: ${{ steps.runner_state.outputs.selected_runner }}
        run: |
          set -euo pipefail
          mkdir -p target/ci

          mode="auto"
          trusted_event="${TRUSTED_SELF_HOSTED}"
          runner_token_available="${RUNNER_TOKEN_AVAILABLE}"
          runner_api_available="${RUNNER_API_AVAILABLE}"
          eligible_runners="${ELIGIBLE_RUNNERS}"
          busy_runners="${BUSY_RUNNERS}"
          healthy_runners="${HEALTHY_RUNNERS}"
          route_health="${ROUTE_HEALTH}"
          selected_runner="${SELECTED_RUNNER:-}"
          case "${FORCE_TARGET:-auto}" in
            auto|"")
              ;;
            github-hosted|force-github-hosted)
              mode="force-github-hosted"
              ;;
            self-hosted|force-self-hosted)
              mode="force-self-hosted"
              ;;
            simulate-full)
              runner_token_available="true"
              runner_api_available="true"
              eligible_runners="2"
              busy_runners="2"
              healthy_runners="2"
              route_health="healthy"
              selected_runner=""
              ;;
            simulate-unhealthy)
              runner_token_available="true"
              runner_api_available="true"
              eligible_runners="1"
              busy_runners="0"
              healthy_runners="0"
              route_health="degraded"
              selected_runner=""
              ;;
            simulate-api-unavailable)
              runner_token_available="true"
              runner_api_available="false"
              eligible_runners="0"
              busy_runners="0"
              healthy_runners="0"
              route_health="unknown"
              selected_runner=""
              ;;
            simulate-untrusted)
              trusted_event="false"
              runner_token_available="true"
              runner_api_available="true"
              eligible_runners="1"
              busy_runners="0"
              healthy_runners="1"
              route_health="healthy"
              selected_runner="simulated-runner"
              ;;
            *)
              echo "unsupported force_target=${FORCE_TARGET}" >&2
              exit 2
              ;;
          esac

          fork_args=()
          if [ "${FORK_PR}" = "true" ]; then
            fork_args+=(--fork-pr)
          fi

          selected_runner_args=()
          if [ -n "${selected_runner:-}" ]; then
            selected_runner_args+=(--selected-runner "${selected_runner}")
          fi

          cargo +1.95.0 xtask ci-route \
            --lane rust-small \
            --json target/ci/route-rust-small.json \
            --mode "${mode}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --head-sha "${GITHUB_SHA}" \
            --trusted-event "${trusted_event}" \
            "${fork_args[@]}" \
            --runner-token-available "${runner_token_available}" \
            --runner-api-available "${runner_api_available}" \
            --eligible-runners "${eligible_runners}" \
            --busy-runners "${busy_runners}" \
            --healthy-runners "${healthy_runners}" \
            --health "${route_health}" \
            --selected-runner-label em-ci-small \
            "${selected_runner_args[@]}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload Rust Small route receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: route-rust-small
          path: target/ci/route-rust-small.json
          if-no-files-found: error

      - name: Summarize route
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool target/ci/route-rust-small.json >/dev/null
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          receipt = json.loads(Path("target/ci/route-rust-small.json").read_text())
          print("## Route Tokmd Rust Small")
          print()
          print("| Field | Value |")
          print("| --- | --- |")
          for key in [
              "target",
              "reason",
              "event_name",
              "trusted_event",
              "eligible_runners",
              "busy_runners",
              "healthy_runners",
              "health",
              "health_age_seconds",
              "disk_free_bytes",
              "scratch_free_bytes",
              "min_free_bytes",
              "fallback_allowed",
              "selected_runner_label",
              "selected_runner",
          ]:
              value = receipt.get(key)
              print(f"| {key} | `{value}` |")
          warnings = ", ".join(receipt.get("warnings", [])) or "<none>"
          errors = ", ".join(receipt.get("errors", [])) or "<none>"
          print(f"| warnings | `{warnings}` |")
          print(f"| errors | `{errors}` |")
          print()
          print("Receipt: `target/ci/route-rust-small.json`")
          PY
          fi

  rust-small-self-hosted:
    name: Tokmd Rust Small on Self Hosted
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'self-hosted'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "6"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Prepare self-hosted scratch
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Preflight self-hosted toolchain
        shell: bash
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          if command -v python3 >/dev/null 2>&1; then python3 --version; elif command -v python >/dev/null 2>&1; then python --version; fi

      - name: Check workspace on self-hosted
        run: cargo check --workspace --all-features --locked

      - name: Test workspace on self-hosted
        run: cargo test --workspace --all-features --locked

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf "$TMPDIR"
          rm -rf "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  rust-small-github:
    name: Tokmd Rust Small on GitHub Hosted
    needs: route-rust-small
    if: >-
      github.repository == 'EffortlessMetrics/tokmd-swarm' &&
      needs.route-rust-small.outputs.target == 'github-hosted'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Use larger writable target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ${{ runner.temp }}/target
          save-if: false

      - name: Check and test tokmd rust-small on GitHub Hosted
        run: |
          cargo check --workspace --all-features --locked
          cargo test --workspace --all-features --locked

  rust-small-result:
    name: Tokmd Rust Small Result
    needs:
      - route-rust-small
      - rust-small-self-hosted
      - rust-small-github
    if: >-
      always() &&
      github.repository == 'EffortlessMetrics/tokmd-swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Collect routed Rust Small telemetry
        id: telemetry
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ needs.route-rust-small.outputs.target }}
        run: |
          set -euo pipefail
          mkdir -p target/ci

          selected_name=""
          cache_note="unavailable"
          case "${TARGET}" in
            self-hosted)
              selected_name="Tokmd Rust Small on Self Hosted"
              cache_note="self-hosted cargo cache with scratch target cleanup"
              ;;
            github-hosted)
              selected_name="Tokmd Rust Small on GitHub Hosted"
              cache_note="GitHub-hosted rust-cache restore only; PR runs do not save cache"
              ;;
            *)
              selected_name=""
              cache_note="no implementation job selected"
              ;;
          esac

          jobs_json="target/ci/routed-rust-small-jobs.json"
          if [ -n "${selected_name}" ] && gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" > "${jobs_json}"; then
            SELECTED_JOB_NAME="${selected_name}" JOBS_JSON="${jobs_json}" CACHE_NOTE="${cache_note}" python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt
          import json
          import os
          from pathlib import Path

          def parse_time(value):
              if not value:
                  return None
              return dt.datetime.fromisoformat(value.replace("Z", "+00:00"))

          def seconds_between(start, end):
              if not start or not end:
                  return ""
              return f"{max((end - start).total_seconds(), 0):.3f}"

          selected_name = os.environ["SELECTED_JOB_NAME"]
          data = json.loads(Path(os.environ["JOBS_JSON"]).read_text())
          selected = next((job for job in data.get("jobs", []) if job.get("name") == selected_name), None)
          if selected:
              created = parse_time(selected.get("created_at"))
              started = parse_time(selected.get("started_at"))
              completed = parse_time(selected.get("completed_at"))
              duration_seconds = seconds_between(started, completed)
              queue_seconds = seconds_between(created, started)
              runner_labels = ",".join(selected.get("labels") or [])
              runner_name = selected.get("runner_name") or ""
              runner_group = selected.get("runner_group_name") or ""
          else:
              duration_seconds = ""
              queue_seconds = ""
              runner_labels = ""
              runner_name = ""
              runner_group = ""

          print(f"selected_duration_seconds={duration_seconds}")
          print(f"selected_queue_seconds={queue_seconds}")
          print(f"selected_runner_name={runner_name}")
          print(f"selected_runner_group={runner_group}")
          print(f"selected_runner_labels={runner_labels}")
          print(f"cache_note={os.environ['CACHE_NOTE']}")
          PY
          else
            {
              echo "selected_duration_seconds="
              echo "selected_queue_seconds="
              echo "selected_runner_name="
              echo "selected_runner_group="
              echo "selected_runner_labels="
              echo "cache_note=${cache_note}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate router and selected target
        shell: bash
        env:
          TARGET: ${{ needs.route-rust-small.outputs.target }}
          REASON: ${{ needs.route-rust-small.outputs.reason }}
          SELECTED_RUNNER_LABEL: ${{ needs.route-rust-small.outputs.selected_runner_label }}
          ROUTE_RECEIPT_PATH: ${{ needs.route-rust-small.outputs.receipt_path }}
          ROUTER_RESULT: ${{ needs.route-rust-small.result }}
          SELF_HOSTED_RESULT: ${{ needs.rust-small-self-hosted.result }}
          GITHUB_RESULT: ${{ needs.rust-small-github.result }}
          SELECTED_DURATION_SECONDS: ${{ steps.telemetry.outputs.selected_duration_seconds }}
          SELECTED_QUEUE_SECONDS: ${{ steps.telemetry.outputs.selected_queue_seconds }}
          SELECTED_RUNNER_NAME: ${{ steps.telemetry.outputs.selected_runner_name }}
          SELECTED_RUNNER_GROUP: ${{ steps.telemetry.outputs.selected_runner_group }}
          SELECTED_RUNNER_LABELS: ${{ steps.telemetry.outputs.selected_runner_labels }}
          CACHE_NOTE: ${{ steps.telemetry.outputs.cache_note }}
        run: |
          set -eu
          mkdir -p target/ci

          echo "router_target=${TARGET:-<empty>}"
          echo "router_reason=${REASON:-<empty>}"
          echo "selected_runner_label=${SELECTED_RUNNER_LABEL:-<empty>}"
          echo "route_receipt_path=${ROUTE_RECEIPT_PATH:-<empty>}"
          echo "router_result=${ROUTER_RESULT:-<empty>}"
          echo "self_hosted_result=${SELF_HOSTED_RESULT:-<empty>}"
          echo "github_result=${GITHUB_RESULT:-<empty>}"
          echo "selected_duration_seconds=${SELECTED_DURATION_SECONDS:-<empty>}"
          echo "selected_queue_seconds=${SELECTED_QUEUE_SECONDS:-<empty>}"
          echo "selected_runner_name=${SELECTED_RUNNER_NAME:-<empty>}"
          echo "selected_runner_group=${SELECTED_RUNNER_GROUP:-<empty>}"
          echo "cache_note=${CACHE_NOTE:-<empty>}"

          run_attempt="${GITHUB_RUN_ATTEMPT:-1}"
          case "${run_attempt}" in
            ''|*[!0-9]*)
              rerun_count=0
              ;;
            *)
              if [ "${run_attempt}" -gt 1 ]; then
                rerun_count=$((run_attempt - 1))
              else
                rerun_count=0
              fi
              ;;
          esac
          echo "run_attempt=${run_attempt:-<empty>}"
          echo "rerun_count=${rerun_count}"

          ok="false"
          status="failure"
          selected_result=""
          selected_job=""
          unselected_result=""
          unselected_job=""
          message=""

          if [ "${ROUTER_RESULT}" != "success" ]; then
            message="router job did not succeed; failing normalized result"
          else
            case "${TARGET}" in
              self-hosted)
                selected_job="rust-small-self-hosted"
                selected_result="${SELF_HOSTED_RESULT}"
                unselected_job="rust-small-github"
                unselected_result="${GITHUB_RESULT}"
                ;;
              github-hosted)
                selected_job="rust-small-github"
                selected_result="${GITHUB_RESULT}"
                unselected_job="rust-small-self-hosted"
                unselected_result="${SELF_HOSTED_RESULT}"
                ;;
              none)
                selected_job="none"
                selected_result="none"
                unselected_job="none"
                unselected_result="none"
                message="No execution lane selected (reason=${REASON}). Rerun via workflow_dispatch with force_target=github-hosted if a hosted diagnostic run is needed."
                ;;
              *)
                selected_job="unknown"
                selected_result="unknown"
                unselected_job="unknown"
                unselected_result="unknown"
                message="router produced unknown target: ${TARGET}"
                ;;
            esac

            if [ "${selected_job}" != "none" ] && [ "${selected_job}" != "unknown" ] && [ "${selected_result}" != "success" ]; then
              message="selected target ${TARGET} but ${selected_job} result was ${selected_result}"
            elif [ "${unselected_job}" != "none" ] && [ "${unselected_job}" != "unknown" ] && [ "${unselected_result}" != "skipped" ]; then
              message="selected target ${TARGET} succeeded but unselected ${unselected_job} result was ${unselected_result}; expected exactly one implementation job"
            elif [ "${selected_result}" = "success" ]; then
              ok="true"
              status="success"
              message="selected target ${TARGET} succeeded and unselected ${unselected_job} stayed skipped"
            fi
          fi

          export ROUTER_TARGET="${TARGET:-}"
          export ROUTER_REASON="${REASON:-}"
          export ROUTER_SELECTED_RUNNER_LABEL="${SELECTED_RUNNER_LABEL:-}"
          export ROUTER_RECEIPT_PATH="${ROUTE_RECEIPT_PATH:-}"
          export ROUTER_RESULT="${ROUTER_RESULT:-}"
          export SELECTED_JOB="${selected_job}"
          export SELECTED_RESULT="${selected_result}"
          export RESULT_OK="${ok}"
          export RESULT_STATUS="${status}"
          export RESULT_MESSAGE="${message}"
          export SELF_HOSTED_RESULT="${SELF_HOSTED_RESULT:-}"
          export GITHUB_RESULT="${GITHUB_RESULT:-}"
          export RERUN_COUNT="${rerun_count}"
          export SELECTED_DURATION_SECONDS="${SELECTED_DURATION_SECONDS:-}"
          export SELECTED_QUEUE_SECONDS="${SELECTED_QUEUE_SECONDS:-}"
          export SELECTED_RUNNER_NAME="${SELECTED_RUNNER_NAME:-}"
          export SELECTED_RUNNER_GROUP="${SELECTED_RUNNER_GROUP:-}"
          export SELECTED_RUNNER_LABELS="${SELECTED_RUNNER_LABELS:-}"
          export CACHE_NOTE="${CACHE_NOTE:-}"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def env(name, default=""):
              return os.environ.get(name, default)

          def optional_float(value):
              if not value:
                  return None
              try:
                  return float(value)
              except ValueError:
                  return None

          receipt = {
              "schema": "tokmd.routed_rust_small_result.v1",
              "schema_version": 1,
              "ok": env("RESULT_OK") == "true",
              "status": env("RESULT_STATUS", "failure"),
              "message": env("RESULT_MESSAGE"),
              "router": {
                  "target": env("ROUTER_TARGET"),
                  "reason": env("ROUTER_REASON"),
                  "selected_runner_label": env("ROUTER_SELECTED_RUNNER_LABEL"),
                  "receipt_path": env("ROUTER_RECEIPT_PATH"),
                  "result": env("ROUTER_RESULT"),
              },
              "selected": {
                  "job": env("SELECTED_JOB"),
                  "result": env("SELECTED_RESULT"),
              },
              "jobs": {
                  "self_hosted": env("SELF_HOSTED_RESULT"),
                  "github": env("GITHUB_RESULT"),
              },
              "telemetry": {
                  "duration_seconds": optional_float(env("SELECTED_DURATION_SECONDS")),
                  "queue_seconds": optional_float(env("SELECTED_QUEUE_SECONDS")),
                  "runner_name": env("SELECTED_RUNNER_NAME"),
                  "runner_group": env("SELECTED_RUNNER_GROUP"),
                  "runner_labels": [
                      label for label in env("SELECTED_RUNNER_LABELS").split(",") if label
                  ],
                  "cache_note": env("CACHE_NOTE"),
              },
              "run": {
                  "event": env("GITHUB_EVENT_NAME"),
                  "run_id": env("GITHUB_RUN_ID"),
                  "run_attempt": env("GITHUB_RUN_ATTEMPT"),
                  "rerun_count": int(env("RERUN_COUNT", "0")),
                  "sha": env("GITHUB_SHA"),
                  "ref": env("GITHUB_REF"),
              },
          }

          path = Path("target/ci/routed-rust-small-result.json")
          path.write_text(json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Tokmd Rust Small Result"
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| status | \`${status}\` |"
              echo "| target | \`${TARGET:-<empty>}\` |"
              echo "| reason | \`${REASON:-<empty>}\` |"
              echo "| selected runner label | \`${SELECTED_RUNNER_LABEL:-<empty>}\` |"
              echo "| selected job | \`${selected_job:-<empty>}\` |"
              echo "| selected result | \`${selected_result:-<empty>}\` |"
              echo "| result basis | \`${message:-<empty>}\` |"
              echo "| selected duration seconds | \`${SELECTED_DURATION_SECONDS:-unavailable}\` |"
              echo "| selected queue seconds | \`${SELECTED_QUEUE_SECONDS:-unavailable}\` |"
              echo "| selected runner name | \`${SELECTED_RUNNER_NAME:-unavailable}\` |"
              echo "| cache note | \`${CACHE_NOTE:-unavailable}\` |"
              echo "| run attempt | \`${run_attempt:-<empty>}\` |"
              echo "| rerun count | \`${rerun_count}\` |"
              echo
              echo 'Receipt: `target/ci/routed-rust-small-result.json`'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${ok}" != "true" ]; then
            echo "${message}" >&2
            exit 1
          fi
          echo "Tokmd Rust Small Result: success"

      - name: Verify routed Rust Small result receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s target/ci/routed-rust-small-result.json
          python -m json.tool target/ci/routed-rust-small-result.json >/dev/null

      - name: Upload routed Rust Small result receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: routed-rust-small-result
          path: target/ci/routed-rust-small-result.json
          if-no-files-found: error
