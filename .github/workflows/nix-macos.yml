name: Nix Build (macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: nix-macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

jobs:
  nix-macos:
    if: github.repository == 'EffortlessMetrics/tokmd'
    runs-on: macos-latest
    timeout-minutes: 150
    permissions:
      contents: read
      id-token: write
    env:
      # Set the repository variable `NIX_USE_FLAKEHUB_CACHE=true` once the
      # trusted FlakeHub Cache path is provisioned for this repo.
      USE_FLAKEHUB_CACHE: ${{ vars.NIX_USE_FLAKEHUB_CACHE }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        if: env.USE_FLAKEHUB_CACHE != 'true'
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Install Nix with FlakeHub support
        if: env.USE_FLAKEHUB_CACHE == 'true'
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Setup FlakeHub cache
        id: flakehub-cache
        if: env.USE_FLAKEHUB_CACHE == 'true'
        continue-on-error: true
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Setup Nix cache
        if: env.USE_FLAKEHUB_CACHE != 'true' || steps.flakehub-cache.outcome != 'success'
        continue-on-error: true
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
          use-gha-cache: enabled

      - name: Check flake
        run: nix flake check --no-build --accept-flake-config

      - name: Build package
        run: nix build -L
