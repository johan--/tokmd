# typos spell checker configuration
# https://github.com/crate-ci/typos

[files]
# Extend default ignore list
extend-exclude = [
    # Lock files
    "Cargo.lock",
    "*.lock",
    # Generated/snapshot files
    "*.snap",
    "snapshots/",
    # Build artifacts
    "target/",
    # Test fixtures and output
    "mutants.out*/",
    "m_out/",
    "mut/",
    # Nix
    "flake.lock",
]

[default]
# Extend default dictionary with project-specific words
extend-ignore-identifiers-re = [
    # Hex hashes (blake3, etc.)
    "[a-fA-F0-9]{32,}",
]

[default.extend-words]
# Project-specific terms
tokmd = "tokmd"
tokei = "tokei"
tokeignore = "tokeignore"

# Rust/cargo ecosystem terms
rustfmt = "rustfmt"
clippy = "clippy"
serde = "serde"
proptest = "proptest"

# Metrics and analysis terms
cocomo = "cocomo"
jsonl = "jsonl"

# Common abbreviations
loc = "loc"
sloc = "sloc"
hel = "hel"
hel2 = "hel2"

# Mathematical abbreviations (numerator/denominator)
numer = "numer"

# Malformed JSON in FFI envelope error tests (e.g. `{"ok": tru"`)
tru = "tru"
# Test variable suffixes (ordering patterns: ab = a-then-b, ba = b-then-a)
ba = "ba"
bck = "bck"
# Test data (obfuscated text in deep.rs:138)
caf = "caf"
# Proptest strategy abbreviation in function names
strat = "strat"
# French word 'données' (data) in Unicode test fixtures
donn = "donn"

[type.rust]
# Rust-specific settings if needed
