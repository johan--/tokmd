schema = "tokmd.jules.active_goal.v1"
status = "complete"
program = "code_intelligence"
lane = "proof_artifact_check_receipts"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/proof-artifact-check-receipts.md"
proof_observation_artifacts = "docs/ci/proof-observation-artifacts.md"
artifact_glossary = "docs/artifacts.md"
proof_policy = "ci/proof.toml"
ci_workflow = ".github/workflows/ci.yml"
proof_executor_workflow = ".github/workflows/proof-executor.yml"
xtask_cli = "xtask/src/cli.rs"
proof_artifacts_checker = "xtask/src/tasks/proof_artifacts_check.rs"

[rules]
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
required_ci = "preserve_existing_required_aggregate_behavior"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas"
source_artifacts = "do_not_replace_proof_plan_executor_or_proof_run_source_artifacts"

[stop_conditions]
proof_artifacts_tests = "cargo test -p xtask proof_artifacts --verbose"
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-proof-artifact-check-receipts.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-proof-artifact-check-receipts.json --evidence-json target/proof/proof-evidence-proof-artifact-check-receipts.json"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"

[completion]
completed_on = "2026-05-15"
closeout_plan = "docs/plans/proof-artifact-check-receipts.md"
outcome = "proof_artifact_verifier_receipts_uploaded"
evidence = "PR #2283 added optional JSON receipts to proof artifact verifiers, wired workflow uploads, and passed hosted PR checks plus post-merge main CI"
