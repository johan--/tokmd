schema = "tokmd.jules.active_goal.v1"
status = "complete"
program = "code_intelligence"
lane = "ci_risk_pack_outputs"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/ci-risk-pack-outputs.md"
ci_plan_docs = "docs/ci/pr-plan.md"
ci_risk_packs = "policy/ci-risk-packs.toml"
ci_lane_whitelist = "policy/ci-lane-whitelist.toml"
ci_workflow = ".github/workflows/ci.yml"
proof_policy = "ci/proof.toml"

[rules]
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
ci_routing = "rust_owned_policy_backed_outputs"
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "preserve_receipt_semantics"
review_surface = "cockpit_remains_review_evidence_surface"
ast_default_behavior = "do_not_change_default_receipts_or_browser_capabilities"

[stop_conditions]
open_pr_queue = "must_be_empty_before_starting_new_lane"
ci_plan_tests = "cargo test -p xtask ci_plan --verbose"
ci_plan_outputs = "cargo xtask ci-plan --base origin/main --head HEAD --json-out target/ci/ci-plan.json --github-output target/ci/ci-plan.outputs"
docs_check = "cargo xtask docs --check"
doc_artifacts = "cargo xtask doc-artifacts --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-ci-risk-pack-outputs.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-ci-risk-pack-outputs.json --evidence-json target/proof/proof-evidence-ci-risk-pack-outputs.json"
diff_hygiene = "git diff --check"

[completion]
completed_on = "2026-05-15"
closeout_plan = "docs/plans/ci-risk-pack-outputs.md"
outcome = "rust_owned_ci_risk_pack_outputs"
evidence = "PR #2281 replaced the CI detect job shell classifier with cargo xtask ci-plan --github-output; hosted PR checks and post-merge main CI passed"
