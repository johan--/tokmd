schema = "tokmd.jules.active_goal.v1"
status = "active"
program = "code_intelligence"
lane = "proof_run_status_packet"
outcome = "define_rust_owned_proof_workflow_status_packet"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/proof-run-status-packet.md"
proof_policy = "ci/proof.toml"
next_program = "docs/NEXT.md"
artifact_glossary = "docs/artifacts.md"
gap_audit_plan = "docs/plans/proof-orchestration-gap-audit.md"
proof_observation_plan = "docs/plans/proof-observation-decision-readiness.md"
proof_artifact_receipts_plan = "docs/plans/proof-artifact-check-receipts.md"
mutation_scope_plan = "docs/plans/mutation-scope-selection.md"
mutation_summary_plan = "docs/plans/mutation-summary-parsing.md"
ci_workflow = ".github/workflows/ci.yml"
proof_executor_workflow = ".github/workflows/proof-executor.yml"
proof_plan_task = "xtask/src/tasks/proof_plan.rs"
proof_artifacts_task = "xtask/src/tasks/proof_artifacts_check.rs"

[rules]
github_actions_boundary = "keep_actions_as_runner_cache_tool_artifact_shell"
proof_status = "routine_observation_only"
fast_proof_status = "advisory_only"
scoped_coverage_status = "advisory_non_required"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas"
scope = "plan_then_summarize_status_arbitration_only"

[stop_conditions]
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-proof-run-status-packet.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-proof-run-status-packet.json --evidence-json target/proof/proof-evidence-proof-run-status-packet.json"
proof_run_tests = "cargo test -p xtask proof_run --verbose"
proof_artifacts_tests = "cargo test -p xtask proof_artifacts --verbose"
proof_observation_status_tests = "cargo test -p xtask proof_observation_status --verbose"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"
