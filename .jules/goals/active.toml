schema = "tokmd.jules.active_goal.v1"
status = "active"
program = "code_intelligence"
lane = "publishing_evidence_readiness"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/publishing-evidence-readiness.md"
publishing_evidence_spec = "docs/specs/publishing-evidence.md"
publishing_evidence_guide = "docs/publishing-evidence.md"
proof_observation_artifacts = "docs/ci/proof-observation-artifacts.md"
artifact_glossary = "docs/artifacts.md"
proof_policy = "ci/proof.toml"
next_program = "docs/NEXT.md"
publish_surface = "docs/publish-surface.md"
production_publishability_adr = "docs/adr/0001-production-package-publishability.md"
publish_surface_taxonomy_adr = "docs/adr/0003-publish-surface-taxonomy.md"
release_train_adr = "docs/adr/0005-release-train-and-rc-semantics.md"
release_workflow = ".github/workflows/release.yml"
ci_lane_whitelist = "policy/ci-lane-whitelist.toml"

[rules]
publishing_state = "document_current_evidence_before_changing_release_behavior"
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
release_mutation = "do_not_publish_tag_create_release_or_push_images"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas_without_a_plan"
publish_surface = "do_not_change_package_membership_or_publishability_without_separate_plan"

[stop_conditions]
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-publishing-evidence-readiness.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-publishing-evidence-readiness.json --evidence-json target/proof/proof-evidence-publishing-evidence-readiness.json"
publish_surface = "cargo xtask publish-surface --json --verify-publish"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"
