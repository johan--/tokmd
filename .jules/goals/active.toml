schema = "tokmd.jules.active_goal.v1"
status = "paused"
program = "code_intelligence"
lane = "no_selected_implementation_lane"
outcome = "closed_lanes_hold_until_fresh_consumer_or_artifact_gap"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
next_program = "docs/NEXT.md"
proof_policy = "ci/proof.toml"
platform_audit = "docs/plans/code-intelligence-platform-audit.md"
user_path_plan = "docs/plans/user-path-evidence-consumption.md"
publishing_evidence_plan = "docs/plans/publishing-evidence-readiness.md"
proof_observation_plan = "docs/plans/proof-observation-decision-readiness.md"
proof_workflow_status_plan = "docs/plans/proof-run-status-packet.md"
ast_corpus_expansion_plan = "docs/plans/ast-function-boundary-corpus-expansion.md"
architecture_plan = "docs/architecture-consolidation-plan.md"

[rules]
scope = "no_new_implementation_lane_without_fresh_gap"
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas"
review_surface = "cockpit_remains_review_evidence_surface"
ast_shadow = "do_not_change_default_receipts_or_browser_capabilities"
architecture = "do_not_continue_consolidation_without_fresh_evidence"
release_mutation = "do_not_publish_tag_create_release_or_push_images"
generated_prs = "review_as_candidate_evidence_not_roadmap_owners"

[stop_conditions]
open_pr_queue = "must_be_empty_before_starting_new_lane"
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-active-goal-parked-state.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-active-goal-parked-state.json --evidence-json target/proof/proof-evidence-active-goal-parked-state.json"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"
