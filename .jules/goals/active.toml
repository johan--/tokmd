doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
product_readiness_plan = "docs/plans/product-readiness.md"
artifact_glossary_plan = "docs/plans/artifact-glossary.md"
artifact_glossary = "docs/artifacts.md"
ast_shadow_spec = "docs/specs/ast-shadow.md"
ast_shadow_plan = "docs/plans/ast-shadow-contract.md"
ast_shadow_artifact_builder_plan = "docs/plans/ast-shadow-artifact-builder.md"
ast_rust_landmark_coverage_plan = "docs/plans/ast-rust-landmark-coverage.md"
ast_shadow_performance_plan = "docs/plans/ast-shadow-performance-benchmark.md"
ast_shadow_comparison_runner_plan = "docs/plans/ast-shadow-comparison-runner.md"
ast_foundation_adr = "docs/adr/0008-ast-foundation.md"
handoff_guide = "docs/handoff.md"
handoff_schema = "docs/handoff-schema.md"
review_packet_contract = "docs/review-packet.md"
cockpit_proof_evidence = "docs/cockpit-proof-evidence.md"
proof_observation_decision_plan = "docs/plans/proof-observation-decision-readiness.md"
proof_policy = "ci/proof.toml"

[rules]
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "preserve_receipt_semantics"
review_surface = "cockpit_remains_review_evidence_surface"
handoff_integrity = "link_review_and_proof_receipts_without_replacing_their_verifiers"
ast_shadow = "developer_facing_shadow_artifacts_only"
ast_default_behavior = "do_not_change_default_receipts_or_browser_capabilities"
ast_schema = "public_ast_fields_require_schema_family_review"
proof_observation = "summarize_existing_receipts_before_any_promotion_decision"
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"

[stop_conditions]
open_pr_queue = "must_be_empty_before_starting_new_lane"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan"
proof_artifacts = "do_not_treat_advisory_or_planned_evidence_as_passing_proof"
browser_boundary = "do_not_claim_browser_wasm_ast_capability_without_capability_and_bundle_evidence"
