schema = "tokmd.proof_policy.v1"

[defaults]
mutation_timeout_seconds = 300
coverage = "scoped"
fail_on_unknown_non_rust = true

[tools]
rust = "stable"
coverage = "cargo-llvm-cov"
javascript = "npm"

[executor]
family = "coverage"
ci_execution = "explicit_opt_in"
max_dry_run_commands = 1

[executor.pr]
default_enabled = true
required = false
max_commands = 2
codecov_upload = false

[executor.promotion]
window = "last_successful_runs"
run_limit = 100
min_observations = 1
min_executed = 4
min_scopes = 4
min_artifacts = 4
min_passing_collector_runs = 1
required_gate = false
default_codecov_upload = false

[proof_run.pr]
default_enabled = true
profile = "fast"
required = false
artifact_name = "fast-proof-run"

[[scope]]
name = "workspace_dependency_graph"
kind = "rust"
paths = [
  "Cargo.lock",
  "Cargo.toml",
  "crates/**/Cargo.toml",
  "crates/tokmd-node/package.json",
  "crates/tokmd-node/npm/package.json",
  "deny.toml",
  "crates/tokmd-types/tests/manifest_contract.rs",
  "xtask/Cargo.toml",
]
packages = ["xtask"]
proof = [
  "cargo deny --all-features check",
  "cargo test -p tokmd-types manifest_stays_clap_free --verbose",
  "cargo xtask boundaries-check",
  "cargo xtask publish-surface --json",
]
mutation = false
coverage = false

[[scope]]
name = "vendored_home_patch"
kind = "rust"
paths = [
  "Cargo.toml",
  "vendor/home-0.5.12/**",
]
proof = [
  "cargo tree -i home --edges normal",
  "cargo test --manifest-path vendor/home-0.5.12/Cargo.toml --verbose",
]
reason = "The patched `home` crate is vendored to supply tokmd's non-Unix/non-Windows fallback while preserving the upstream Windows implementation."
mutation = false
coverage = false

