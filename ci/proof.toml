  "docs/adr/0007-schema-family-versioning.md",
  "docs/baseline.schema.json",
  "docs/handoff.schema.json",
  "docs/handoff-schema.md",
  "docs/schema.json",
  "docs/requirements.md",
]
packages = ["tokmd-types", "tokmd"]
proof = [
  "cargo test -p tokmd-types schema --verbose",
  "cargo test -p tokmd --test schema_sync --verbose",
  "cargo test -p tokmd --test schema_doc_sync --verbose",
  "cargo xtask docs --check",
]
mutation = false
coverage = true

[[allow.workspace_area]]
name = "jules_knowledge_workspace"
paths = [".jules/**"]
reason = "Durable specs, investigations, friction notes, persona learnings, and generated indexes are allowed here."
discourage = [
  "raw terminal logs",
  "duplicated run transcripts",
  "large binary artifacts",
]

[[dependency_boundary]]
name = "retired_tokmd_config_must_not_return"
packages = ["*"]
forbid = ["tokmd-config"]
reason = "tokmd-config is retired; ownership lives in tokmd-settings, tokmd-core, and tokmd."

[[forbid.fixture_blob]]
name = "committed_crypto_fixture_blobs"
extensions = [
  "cer",
  "crt",
  "der",
  "jwk",
  "jwks",
  "key",
  "p12",
  "p8",
  "pem",
  "pfx",
  "pk8",
]
markers = [
  "BEGIN CERTIFICATE",
  "BEGIN EC PRIVATE KEY",
  "BEGIN OPENSSH PRIVATE KEY",
  "BEGIN PRIVATE KEY",
  "BEGIN RSA PRIVATE KEY",
]
allow = [
  ".claude/**",
  ".jules/**",
  "ci/proof.toml",
  "vendor/**",
  "xtask/src/tasks/fixture_blobs_check.rs",
]
reason = "Crypto material should be generated at runtime or explicitly documented in an allowlisted workspace area."
