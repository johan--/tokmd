schema = "tokmd.proof_policy.v1"

[defaults]
mutation_timeout_seconds = 300
coverage = "scoped"
fail_on_unknown_non_rust = true

[tools]
rust = "stable"
coverage = "cargo-llvm-cov"
javascript = "npm"

[[scope]]
name = "proof_control_plane"
kind = "rust"
paths = [
  ".github/workflows/ci.yml",
  "ci/proof.toml",
  "docs/NEXT.md",
  "xtask/src/cli.rs",
  "xtask/src/main.rs",
  "xtask/src/proof/**",
  "xtask/src/tasks/mod.rs",
  "xtask/src/tasks/affected.rs",
  "xtask/src/tasks/boundaries_check.rs",
  "xtask/src/tasks/fixture_blobs_check.rs",
  "xtask/src/tasks/proof_policy.rs",
  "xtask/src/tasks/proof_plan.rs",
  "xtask/tests/affected_w91.rs",
  "xtask/tests/fixture_blobs_w83.rs",
  "xtask/tests/proof_policy_w90.rs",
  "xtask/tests/proof_plan_w92.rs",
]
packages = ["xtask"]
proof = [
  "cargo xtask proof-policy --check",
  "cargo test -p xtask proof_policy --verbose",
  "cargo test -p xtask affected --verbose",
  "cargo test -p xtask fixture_blob --verbose",
  "cargo test -p xtask proof_plan --verbose",
]
mutation = false
coverage = false

[[scope]]
name = "tokmd_core_ffi"
kind = "rust"
paths = ["crates/tokmd-core/src/ffi.rs", "crates/tokmd-core/tests/**"]
packages = ["tokmd-core"]
proof = [
  "cargo test -p tokmd-core ffi",
  "cargo test -p tokmd-core --test ffi_parity_w53",
]
mutation = true
coverage = true

[[scope]]
name = "tokmd_cli"
kind = "rust"
paths = [
  "crates/tokmd/src/bin/**",
  "crates/tokmd/src/cli/**",
  "crates/tokmd/src/commands/**",
  "crates/tokmd/src/config.rs",
  "crates/tokmd/src/error_hints.rs",
  "crates/tokmd/tests/cli_*.rs",
  "crates/tokmd/tests/config_resolution.rs",
  "docs/reference-cli.md",
]
packages = ["tokmd"]
proof = [
  "cargo test -p tokmd --test cli_snapshot_golden --verbose",
  "cargo test -p tokmd --test cli_e2e --verbose",
  "cargo test -p tokmd --test config_resolution --verbose",
]
mutation = true
coverage = true

[[scope]]
name = "tokmd_gate"
kind = "rust"
paths = [
  "crates/tokmd-gate/**",
  "crates/tokmd/src/commands/gate.rs",
  "crates/tokmd/tests/gate_integration.rs",
]
packages = ["tokmd-gate", "tokmd"]
proof = [
  "cargo test -p tokmd-gate --verbose",
  "cargo test -p tokmd --test gate_integration --verbose",
]
mutation = true
coverage = true

[[scope]]
name = "tokmd_cockpit"
kind = "rust"
paths = [
  ".github/workflows/cockpit.yml",
  "crates/tokmd-cockpit/**",
  "crates/tokmd-types/src/cockpit.rs",
  "crates/tokmd-types/tests/cockpit_tests.rs",
  "crates/tokmd/src/commands/cockpit.rs",
  "crates/tokmd/tests/cockpit_*.rs",
  "docs/tokmd-in-cockpit.md",
]
packages = ["tokmd-cockpit", "tokmd-types", "tokmd"]
proof = [
  "cargo test -p tokmd-cockpit --verbose",
  "cargo test -p tokmd-types cockpit --verbose",
  "cargo test -p tokmd --test cockpit_integration --verbose",
]
mutation = true
coverage = true

[[scope]]
name = "tokmd_wasm"
kind = "rust"
paths = [
  "crates/tokmd-wasm/**",
  "docs/capabilities/wasm.json",
]
packages = ["tokmd-wasm"]
proof = ["cargo test -p tokmd-wasm --verbose"]
mutation = true
coverage = true

[[scope]]
name = "browser_runner"
kind = "non_rust"
paths = ["web/runner/**", "docs/capabilities/wasm.json"]
proof = [
  "npm --prefix web/runner test",
  "npm --prefix web/runner run check",
]
reason = "Browser worker and GitHub ingest logic are JavaScript/WASM-facing surfaces."
mutation = false
coverage = false

[[scope]]
name = "github_action"
kind = "non_rust"
paths = [
  ".github/workflows/test-action.yml",
  "action.yml",
  "docs/github-action.md",
]
proof = [
  "cargo xtask docs --check",
  "cargo test -p tokmd --test docs --verbose",
]
reason = "The composite GitHub Action is a YAML and documentation contract for repository consumers."
mutation = false
coverage = false

[[scope]]
name = "schema_contracts"
kind = "rust"
paths = [
  "crates/tokmd/schemas/**",
  "crates/tokmd/tests/schema*.rs",
  "crates/tokmd-types/src/lib.rs",
  "crates/tokmd-types/tests/schema*.rs",
  "docs/SCHEMA.md",
  "docs/adr/0007-schema-family-versioning.md",
  "docs/baseline.schema.json",
  "docs/handoff.schema.json",
  "docs/handoff-schema.md",
  "docs/schema.json",
]
packages = ["tokmd-types", "tokmd"]
proof = [
  "cargo test -p tokmd-types schema --verbose",
  "cargo test -p tokmd --test schema_sync --verbose",
  "cargo test -p tokmd --test schema_doc_sync --verbose",
  "cargo xtask docs --check",
]
mutation = false
coverage = true

[[allow.workspace_area]]
name = "jules_knowledge_workspace"
paths = [".jules/**"]
reason = "Durable specs, investigations, friction notes, persona learnings, and generated indexes are allowed here."
discourage = [
  "raw terminal logs",
  "duplicated run transcripts",
  "large binary artifacts",
]

[[dependency_boundary]]
name = "retired_tokmd_config_must_not_return"
packages = ["*"]
forbid = ["tokmd-config"]
reason = "tokmd-config is retired; ownership lives in tokmd-settings, tokmd-core, and tokmd."

[[forbid.fixture_blob]]
name = "committed_crypto_fixture_blobs"
extensions = [
  "cer",
  "crt",
  "der",
  "jwk",
  "jwks",
  "key",
  "p12",
  "p8",
  "pem",
  "pfx",
  "pk8",
]
markers = [
  "BEGIN CERTIFICATE",
  "BEGIN EC PRIVATE KEY",
  "BEGIN OPENSSH PRIVATE KEY",
  "BEGIN PRIVATE KEY",
  "BEGIN RSA PRIVATE KEY",
]
allow = [
  ".claude/**",
  ".jules/**",
  "ci/proof.toml",
  "vendor/**",
  "xtask/src/tasks/fixture_blobs_check.rs",
]
reason = "Crypto material should be generated at runtime or explicitly documented in an allowlisted workspace area."
