schema = "tokmd.proof_policy.v1"

[defaults]
mutation_timeout_seconds = 300
coverage = "scoped"
fail_on_unknown_non_rust = true

[tools]
rust = "stable"
coverage = "cargo-llvm-cov"
javascript = "npm"

[executor]
family = "coverage"
ci_execution = "explicit_opt_in"
max_dry_run_commands = 1

[executor.pr]
default_enabled = true
required = false
max_commands = 2
codecov_upload = false

[executor.promotion]
window = "last_successful_runs"
run_limit = 100
min_observations = 1
min_executed = 4
min_scopes = 4
min_artifacts = 4
min_passing_collector_runs = 1
required_gate = false
default_codecov_upload = false

[proof_run.pr]
default_enabled = true
profile = "fast"
required = false
artifact_name = "fast-proof-run"

[[scope]]
name = "workspace_dependency_graph"
kind = "rust"
paths = [
  "Cargo.lock",
  "Cargo.toml",
  "crates/**/Cargo.toml",
