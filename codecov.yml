coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: success
        informational: true

    patch:
      default:
        target: 60%
        threshold: 10%
        if_ci_failed: success
        informational: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true

github_checks:
  annotations: false

ignore:
  - "fuzz/**"
  - "xtask/**"
  - "target/**"
  - "vendor/**"
  - ".jules/**"
